name: articles i18n check

on:
  pull_request:
    paths:
      - "frontend/src/data/articles.ts"
      - "frontend/scripts/articles-check.mjs"
      - "frontend/scripts/articles-translate.mjs"

jobs:
  check:
    name: every article has en/nl/de/fr/es/it
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run articles:check
