name: i18n check

on:
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/scripts/i18n-*.mjs"
      - "frontend/scripts/check-no-hardcoded-strings.mjs"
      - "frontend/.i18nignore"
      - "frontend/package.json"

jobs:
  check:
    name: coverage + hardcoded scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Coverage + hardcoded JSX scan
        run: npm run i18n:check
      - name: Language-detection sanity (full)
        run: npm run i18n:check:full
        # Allow the language-detect step to be informational while
        # franc-min false-positives on technical strings get tuned.
        continue-on-error: true
